<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Confirmar Eliminación</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/estilo.css') }}">
</head>
<body>
  <header>
    <h1>Confirmar Eliminación</h1>
  </header>

  <main>
    <section class="gestion">
      <div class="card">
        <h2>Eliminar usuario #{{ usuario.id_usuario }}</h2>
        <p>¿Estás seguro que deseas eliminar al usuario <strong>{{ usuario.email }}</strong>? Esta acción no se puede deshacer.</p>

        <form method="POST" action="{{ url_for('eliminar_usuario', id_usuario=usuario.id_usuario) }}">
          <button class="btn btn-danger" type="submit">Eliminar definitivamente</button>
          <a class="btn btn-outline" href="{{ url_for('admin_usuarios') }}" style="margin-left:12px;">Cancelar</a>
        </form>
      </div>
    </section>
  </main>
</body>
</html>
