<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Panel de Administrador - Ing Aya</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='administrador.css') }}">
</head>
<body>
  <div class="waves"></div>

  <!-- Sidebar -->
  <div class="sidebar">
    <a href="http://127.0.0.1:5000/admin/usuarios"> Gestión de Usuarios</a>
    <a href="http://127.0.0.1:5000/admin/inmuebles"> Gestión de Inmuebles</a>
    <a href="http://127.0.0.1:5000/admin/citas"> Gestión de Citas</a>
    <a href="../configuracion.html"> Configuración</a>
    <a href="/logout">Cerrar sesión</a>
    


  

      <img src="{{url_for('static',filename='logo_INGAYA_gris-sin fondo.png')}}">

  </div>

  <!-- Contenido principal -->
  <div class="main">
    <!-- Perfil -->
    <div class="perfil">
      <span>Admin</span>
    </div>

    <!-- Imagen central -->
    <img src="https://png.pngtree.com/png-vector/20221124/ourmid/pngtree-recruitment-job-for-social-media-admin-png-image_6478542.png" alt="Engranaje con sombrero" class="principal">
    <p>ING AYA</p>

    <!-- Mensaje animado -->
    <div id="mensaje">¡Bienvenido Administrador!</div>
  </div>

  <script>
    // Animación de mensaje al entrar
    window.onload = function() {
      const mensaje = document.getElementById("mensaje");
      setTimeout(() => {
        mensaje.style.opacity = 1;
      }, 500);
    }

    // Función para descargar la imagen
    function descargarReporte() {
      const imgUrl = "../INFO.png"; // ruta de la imagen
      const link = document.createElement("a");
      link.href = imgUrl;
      link.download = "Reporte_Anual.png"; 
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
    }

    // Manejo del botón con animación
    const btnReporte = document.getElementById("btnReporte");
    const inputCheck = btnReporte.querySelector(".input");

    btnReporte.addEventListener("click", () => {
      // Activar animación de carga
      btnReporte.classList.add("loading");
      inputCheck.checked = true;

      // Descargar imagen después de un momento
      setTimeout(() => {
        descargarReporte();
      }, 800);

      // Restaurar estado original
      setTimeout(() => {
        btnReporte.classList.remove("loading");
        inputCheck.checked = false;
      }, 2500);
    });
  </script>
</body>
</html>
